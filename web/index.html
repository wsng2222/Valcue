<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    id="app-description"
    name="description"
    content="Valcue workout timer for treadmill, bike, and stair workouts."
  >
  <script>
    (function () {
      const descriptions = {
        en: 'Interval workout timer for treadmill, stationary bike, and stair machine.',
        es: 'Temporizador de entrenamiento por intervalos para cinta, bicicleta estática y máquina de escaleras.',
        fr: 'Minuteur d’entraînement fractionné pour tapis de course, vélo d’intérieur et simulateur d’escalier.',
        de: 'Intervalltrainings-Timer für Laufband, Ergometer und Treppensteiger.',
        it: 'Timer per allenamenti a intervalli su tapis roulant, cyclette e stepper.',
        nl: 'Intervaltimer voor loopband, hometrainer en trapmachine.',
        da: 'Intervaltimer til løbebånd, motionscykel og trappemaskine.',
        nb: 'Intervalltimer for tredemølle, ergometersykkel og trappemaskin.',
        ru: 'Таймер интервальных тренировок для беговой дорожки, велотренажёра и степпера.',
        pt: 'Cronômetro de treino intervalado para esteira, bicicleta ergométrica e simulador de escada.',
        ja: 'トレッドミル、フィットネスバイク、ステアクライマー向けのインターバルトレーニングタイマー。',
        zh: '适用于跑步机、健身车和登阶机的间歇训练计时器。',
        ko: '트레드밀, 실내 자전거, 스텝밀을 위한 인터벌 운동 타이머.',
        vi: 'Đồng hồ tập ngắt quãng cho máy chạy bộ, xe đạp tại chỗ và máy leo cầu thang.',
        ar: 'مؤقت للتمارين المتقطعة على جهاز المشي والدراجة الثابتة وجهاز صعود الدرج.',
        th: 'ตัวจับเวลาการฝึกแบบเป็นช่วงสำหรับลู่วิ่ง จักรยานอยู่กับที่ และเครื่องขึ้นบันได'
      };
      const browserCode = (navigator.language || 'en').toLowerCase().split('-')[0];
      const code = browserCode === 'no' ? 'nb' : browserCode;
      const active = descriptions[code] ? code : 'en';
      document.documentElement.lang = active;
      document.documentElement.dir = active === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('app-description').content = descriptions[active];
    }());
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Valcue">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Valcue</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
