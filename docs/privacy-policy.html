<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Valcue Privacy Policy</title>
  <style>
    :root { color-scheme: light dark; --bg:#f7f8fb; --surface:#fff; --text:#111827; --muted:#4b5563; --line:#d1d5db; --accent:#0f766e; }
    @media (prefers-color-scheme: dark) { :root { --bg:#0b1020; --surface:#111827; --text:#f3f4f6; --muted:#cbd5e1; --line:#334155; --accent:#5eead4; } }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",sans-serif; background:var(--bg); color:var(--text); line-height:1.65; }
    main { max-width:900px; margin:0 auto; padding:32px 20px 64px; }
    .toolbar { display:flex; justify-content:flex-end; margin-bottom:12px; }
    .visually-hidden { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
    select { max-width:100%; padding:10px 14px; border:1px solid var(--line); border-radius:12px; background:var(--surface); color:var(--text); font:inherit; }
    .card { background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:clamp(22px,5vw,36px); box-shadow:0 8px 24px rgba(0,0,0,.05); }
    h1,h2 { line-height:1.25; margin-top:0; }
    h1 { font-size:clamp(1.65rem,5vw,2rem); margin-bottom:8px; }
    h2 { font-size:1.1rem; margin:30px 0 10px; color:var(--accent); }
    p,li { color:var(--muted); }
    ul { padding-inline-start:22px; }
    .meta { margin:0 0 24px; color:var(--muted); }
    a { color:var(--accent); overflow-wrap:anywhere; }
  </style>
</head>
<body>
  <main>
    <div class="toolbar"><label><span id="language-label" class="visually-hidden"></span><select id="language"></select></label></div>
    <article id="policy" class="card"></article>
  </main>
  <script>
    const names = { en:'English', es:'Español', fr:'Français', de:'Deutsch', it:'Italiano', nl:'Nederlands', da:'Dansk', nb:'Norsk bokmål', ru:'Русский', pt:'Português (Brasil)', ja:'日本語', zh:'简体中文', ko:'한국어', vi:'Tiếng Việt', ar:'العربية', th:'ไทย' };
    const languageLabels = { en:'Language', es:'Idioma', fr:'Langue', de:'Sprache', it:'Lingua', nl:'Taal', da:'Sprog', nb:'Språk', ru:'Язык', pt:'Idioma', ja:'言語', zh:'语言', ko:'언어', vi:'Ngôn ngữ', ar:'اللغة', th:'ภาษา' };
    const copy = {
      en: {
        title:'Valcue Privacy Policy', updated:'Last updated: July 20, 2026', intro:'This policy explains how Valcue (the “App”), published by Nogic, handles information. Valcue does not require a named account or login.',
        summaryH:'1. Summary', summary:['Workout history, routines, weight records, goals, and settings are mainly stored on your device.','Google Mobile Ads and Google Analytics for Firebase may process device, interaction, diagnostic, and approximate-location data.','Optional cloud features send only the data needed for short routine links or remote Live Activity updates.','Valcue does not upload your weight records or completed workout history to its cloud features.'],
        localH:'2. Data stored on your device', local:'The App stores routines, workout history, weight and goal data, preferences, reminder schedules, and premium-feature state in on-device storage. This data remains there until you delete records, clear the App’s storage, or uninstall the App.',
        thirdH:'3. Google services', third:['Google Mobile Ads (AdMob) may process IP-derived approximate location, device or advertising identifiers, app interactions, and diagnostics to provide ads, prevent fraud, maintain security, and meet legal obligations.','Google Analytics for Firebase records product events such as onboarding, routine creation, workout starts and completions, and premium-screen interactions. Valcue does not put routine names, weight values, or workout-history records in those analytics events.','When a cloud feature is used, Firebase Authentication and App Check may process an anonymous identifier, IP address, user agent, and device/app attestation data.'],
        cloudH:'4. Optional cloud features', cloud:['Creating a short routine link uploads the routine name, machine type, and interval details under a random link ID. Anyone with that link may retrieve the routine. If the cloud service is unavailable, the routine is embedded directly in a longer link instead.','Remote iOS Live Activity updates may send an anonymous identifier, ActivityKit push token, workout-session schedule, and display-ready routine/interval text. Active schedule records expire within 12 hours; cancellation records may be retained for up to 24 hours.','Shared short-link routines currently remain until operational deletion or a valid deletion request. To request deletion, contact us with the link ID.'],
        permissionsH:'5. Device permissions and sharing', permissions:['Notifications are used only when you enable workout reminders or background interval updates.','Camera access is used only when you choose to scan a routine QR code or take a workout photo. Photos stay on your device unless you share them.','The clipboard is checked only to recognize a Valcue routine link for import.','Anything you share is handled by the app or service you select in the system share sheet.'],
        retentionH:'6. Retention, deletion, and choices', retention:'Local data can be removed inside the App where supported, by clearing app storage, or by uninstalling. You can disable reminders, background updates, and camera access in system settings. Google retains third-party data under its own policies. For deletion of a shared routine or other Valcue cloud record, use the contact below and include the relevant link or session details if available.',
        safetyH:'7. Children and security', safety:'Valcue is intended for a general fitness audience, primarily adults, and is not directed to children. Off-device traffic uses encrypted transport. No system can guarantee absolute security, so avoid putting sensitive personal information in routine names or shared links.',
        changesH:'8. Changes', changes:'We may update this policy when the App or its services change. The current version will remain at this URL with a revised update date.',
        contactH:'9. Contact', contact:'For privacy questions, access, or deletion requests, contact Nogic through the support channel on the App Store or the project issue page.', more:'Provider privacy information'
      },
      ko: {
        title:'Valcue 개인정보처리방침', updated:'최종 업데이트: 2026년 7월 20일', intro:'이 방침은 Nogic이 제공하는 Valcue(이하 “앱”)가 정보를 처리하는 방식을 설명합니다. Valcue는 실명 계정 생성이나 로그인을 요구하지 않습니다.',
        summaryH:'1. 요약', summary:['운동 기록, 루틴, 체중 기록, 목표와 설정은 대부분 사용자의 기기에 저장됩니다.','Google 모바일 광고와 Firebase용 Google 애널리틱스는 기기, 앱 사용, 진단 및 대략적 위치 정보를 처리할 수 있습니다.','선택형 클라우드 기능은 짧은 루틴 링크 또는 원격 실시간 현황 업데이트에 필요한 정보만 전송합니다.','체중 기록과 완료한 운동 내역은 Valcue의 클라우드 기능에 업로드되지 않습니다.'],
        localH:'2. 기기에 저장되는 정보', local:'앱은 루틴, 운동 기록, 체중과 목표, 환경설정, 알림 일정 및 프리미엄 기능 상태를 기기 내부 저장소에 보관합니다. 해당 정보는 앱에서 기록을 삭제하거나, 앱 저장 공간을 지우거나, 앱을 제거할 때까지 기기에 남습니다.',
        thirdH:'3. Google 서비스', third:['Google 모바일 광고(AdMob)는 광고 제공, 부정행위 방지, 보안 유지 및 법적 의무 이행을 위해 IP 주소에서 추정한 대략적 위치, 기기 또는 광고 식별자, 앱 사용 정보와 진단 정보를 처리할 수 있습니다.','Firebase용 Google 애널리틱스는 온보딩, 루틴 생성, 운동 시작·완료, 프리미엄 화면 이용과 같은 제품 이벤트를 기록합니다. Valcue는 분석 이벤트에 루틴 이름, 체중 값 또는 운동 기록을 넣지 않습니다.','클라우드 기능을 사용할 때 Firebase Authentication과 App Check는 익명 식별자, IP 주소, 사용자 에이전트 및 기기·앱 증명 정보를 처리할 수 있습니다.'],
        cloudH:'4. 선택형 클라우드 기능', cloud:['짧은 루틴 링크를 만들면 루틴 이름, 기구 종류와 구간 정보가 임의의 링크 ID로 업로드됩니다. 링크를 가진 사람은 누구나 루틴을 불러올 수 있습니다. 클라우드 서비스를 사용할 수 없으면 해당 정보가 긴 링크 자체에 포함됩니다.','iOS 실시간 현황을 원격으로 갱신할 때 익명 식별자, ActivityKit 푸시 토큰, 운동 일정과 화면 표시용 루틴·구간 문구가 전송될 수 있습니다. 활성 일정 기록은 12시간 안에 만료되며, 취소 기록은 최대 24시간 보관될 수 있습니다.','짧은 링크로 공유한 루틴은 운영상 삭제되거나 유효한 삭제 요청을 받을 때까지 보관될 수 있습니다. 삭제를 요청하려면 링크 ID와 함께 문의해 주세요.'],
        permissionsH:'5. 기기 권한과 공유', permissions:['운동 알림 또는 백그라운드 구간 업데이트를 켠 경우에만 알림 권한을 사용합니다.','카메라는 루틴 QR 코드를 스캔하거나 운동 사진을 촬영할 때만 사용합니다. 사진은 직접 공유하지 않는 한 기기에 남습니다.','클립보드는 가져올 수 있는 Valcue 루틴 링크인지 확인하는 용도로만 읽습니다.','사용자가 공유한 정보는 시스템 공유 메뉴에서 선택한 앱 또는 서비스가 처리합니다.'],
        retentionH:'6. 보관, 삭제 및 선택권', retention:'앱이 지원하는 화면에서 기록을 삭제하거나, 앱 저장 공간을 지우거나, 앱을 제거해 로컬 정보를 삭제할 수 있습니다. 시스템 설정에서 알림, 백그라운드 업데이트와 카메라 권한을 끌 수 있습니다. Google은 자체 방침에 따라 제3자 정보를 보관합니다. 공유 루틴이나 다른 Valcue 클라우드 기록의 삭제를 요청하려면 가능한 경우 관련 링크 또는 세션 정보와 함께 아래 연락처로 문의해 주세요.',
        safetyH:'7. 아동과 보안', safety:'Valcue는 주로 성인을 대상으로 한 일반 피트니스 앱이며 아동을 대상으로 하지 않습니다. 기기 외부로 전송되는 데이터는 암호화된 통신을 사용합니다. 어떤 시스템도 완전한 보안을 보장할 수 없으므로 루틴 이름이나 공유 링크에 민감한 개인정보를 넣지 마세요.',
        changesH:'8. 방침 변경', changes:'앱이나 서비스가 바뀌면 이 방침을 업데이트할 수 있습니다. 최신 방침과 변경된 날짜는 이 주소에 게시됩니다.',
        contactH:'9. 문의', contact:'개인정보 관련 질문, 열람 또는 삭제 요청은 App Store에 표시된 지원 채널이나 프로젝트 이슈 페이지를 통해 Nogic에 문의해 주세요.', more:'서비스 제공업체 개인정보 안내'
      },
      ja: {
        title:'Valcue プライバシーポリシー', updated:'最終更新日：2026年7月20日', intro:'本ポリシーは、Nogicが提供するValcue（以下「本アプリ」）における情報の取り扱いを説明するものです。Valcueでは、氏名付きアカウントの作成やログインは必要ありません。',
        summaryH:'1. 概要', summary:['ワークアウト履歴、ルーティン、体重記録、目標、設定は主に端末内に保存されます。','Google Mobile AdsとGoogle Analytics for Firebaseは、端末情報、操作情報、診断情報、IPアドレスから推定されるおおよその位置情報を処理する場合があります。','任意のクラウド機能では、短縮ルーティンリンクまたはLive Activityのリモート更新に必要な情報だけを送信します。','体重記録や完了済みワークアウト履歴がValcueのクラウド機能にアップロードされることはありません。'],
        localH:'2. 端末に保存されるデータ', local:'本アプリは、ルーティン、ワークアウト履歴、体重と目標、各種設定、リマインダー予定、プレミアム機能の状態を端末内に保存します。これらは、アプリ内で削除する、アプリのデータを消去する、またはアプリをアンインストールするまで端末に残ります。',
        thirdH:'3. Googleのサービス', third:['Google Mobile Ads（AdMob）は、広告配信、不正防止、セキュリティ維持、法令遵守のため、IPアドレスから推定されるおおよその位置、端末または広告識別子、アプリ操作、診断情報を処理する場合があります。','Google Analytics for Firebaseは、オンボーディング、ルーティン作成、ワークアウトの開始・完了、プレミアム画面の操作などを記録します。分析イベントにルーティン名、体重値、ワークアウト履歴は含めません。','クラウド機能の利用時、Firebase AuthenticationとApp Checkが匿名識別子、IPアドレス、ユーザーエージェント、端末・アプリの証明情報を処理する場合があります。'],
        cloudH:'4. 任意のクラウド機能', cloud:['短縮ルーティンリンクを作成すると、ルーティン名、マシン種別、インターバル内容がランダムなリンクIDでアップロードされます。リンクを知っている人は誰でも取得できます。クラウドが利用できない場合は、情報を長いリンク自体に埋め込みます。','iOSのLive Activityをリモート更新するため、匿名識別子、ActivityKitプッシュトークン、ワークアウト予定、表示用のルーティン・インターバル文言を送信する場合があります。有効な予定は12時間以内に失効し、キャンセル記録は最大24時間保持される場合があります。','短縮リンクで共有したルーティンは、運用上削除されるか、有効な削除依頼を受けるまで保存される場合があります。削除依頼にはリンクIDを添えてください。'],
        permissionsH:'5. 端末権限と共有', permissions:['通知は、ワークアウトリマインダーまたはバックグラウンド更新を有効にした場合だけ使用します。','カメラは、ルーティンのQRコードをスキャンする場合またはワークアウト写真を撮影する場合だけ使用します。写真は、共有しない限り端末内に残ります。','クリップボードは、取り込み可能なValcueルーティンリンクを検出する目的でのみ確認します。','共有した情報は、システムの共有画面で選択したアプリまたはサービスが取り扱います。'],
        retentionH:'6. 保存期間、削除、選択', retention:'対応するアプリ画面で記録を削除する、アプリデータを消去する、またはアンインストールすることでローカルデータを削除できます。通知、バックグラウンド更新、カメラ権限は端末設定で無効にできます。Googleによるデータ保持には同社のポリシーが適用されます。共有ルーティンなどValcueのクラウド記録の削除は、該当するリンクまたはセッション情報を添えて下記までご依頼ください。',
        safetyH:'7. 子どもとセキュリティ', safety:'Valcueは主に成人向けの一般的なフィットネスアプリであり、子どもを対象としていません。端末外への通信には暗号化を使用します。ただし完全な安全性は保証できないため、ルーティン名や共有リンクに機微な個人情報を入力しないでください。',
        changesH:'8. ポリシーの変更', changes:'本アプリまたはサービスの変更に伴い、本ポリシーを更新する場合があります。最新版と更新日は同じURLに掲載します。',
        contactH:'9. お問い合わせ', contact:'プライバシーに関する質問、開示・削除のご依頼は、App Storeに記載されたサポート窓口またはプロジェクトのIssueページからNogicへご連絡ください。', more:'サービス提供者のプライバシー情報'
      },
      zh: {
        title:'Valcue 隐私政策', updated:'最后更新：2026年7月20日', intro:'本政策说明 Nogic 提供的 Valcue（以下简称“本应用”）如何处理信息。Valcue 无需实名注册或登录。',
        summaryH:'1. 概要', summary:['训练历史、训练计划、体重记录、目标和设置主要存储在你的设备上。','Google 移动广告和 Google Analytics for Firebase 可能会处理设备、互动、诊断以及由 IP 地址推断的大致位置信息。','可选云功能只会发送生成短训练计划链接或远程更新实时活动所需的数据。','Valcue 的云功能不会上传体重记录或已完成的训练历史。'],
        localH:'2. 存储在设备上的数据', local:'本应用会在设备本地存储训练计划、训练历史、体重和目标、偏好设置、提醒计划以及高级功能状态。这些数据会保留到你在应用内删除记录、清除应用数据或卸载应用为止。',
        thirdH:'3. Google 服务', third:['Google 移动广告（AdMob）可能会处理由 IP 推断的大致位置、设备或广告标识符、应用互动和诊断信息，用于提供广告、防止欺诈、维护安全及履行法律义务。','Google Analytics for Firebase 会记录新手引导、训练计划创建、训练开始与完成以及高级功能页面互动等产品事件。Valcue 不会在分析事件中加入训练计划名称、体重数值或训练历史记录。','使用云功能时，Firebase Authentication 和 App Check 可能会处理匿名标识符、IP 地址、用户代理以及设备或应用证明数据。'],
        cloudH:'4. 可选云功能', cloud:['创建短训练计划链接时，训练计划名称、器械类型和间歇详情会以随机链接 ID 上传。任何持有链接的人都能获取该训练计划。如果云服务不可用，数据会直接嵌入较长的链接中。','远程更新 iOS 实时活动时，可能会发送匿名标识符、ActivityKit 推送令牌、训练日程以及用于显示的训练计划和间歇文字。有效日程记录会在 12 小时内过期，取消记录最多可保留 24 小时。','通过短链接分享的训练计划可能会保留到运营清理或收到有效删除请求为止。如需删除，请在联系时提供链接 ID。'],
        permissionsH:'5. 设备权限与分享', permissions:['仅在你启用训练提醒或后台间歇更新时使用通知权限。','仅在你扫描训练计划二维码或拍摄训练照片时使用相机。除非你主动分享，照片会留在设备上。','剪贴板仅用于识别可导入的 Valcue 训练计划链接。','你主动分享的信息由系统分享面板中选择的应用或服务处理。'],
        retentionH:'6. 保留、删除与选择', retention:'你可以在应用支持的页面中删除记录，也可以清除应用数据或卸载应用来删除本地数据。通知、后台更新和相机权限可在系统设置中关闭。Google 会按其自身政策保留第三方数据。如需删除已分享的训练计划或其他 Valcue 云记录，请通过下方方式联系，并尽可能提供相关链接或会话信息。',
        safetyH:'7. 儿童与安全', safety:'Valcue 面向一般健身人群，主要服务成年人，并非为儿童设计。设备外传输使用加密连接。任何系统都无法保证绝对安全，请勿在训练计划名称或分享链接中填写敏感个人信息。',
        changesH:'8. 政策变更', changes:'本应用或服务发生变化时，我们可能会更新本政策。最新版及更新日期会继续发布在此网址。',
        contactH:'9. 联系方式', contact:'如有隐私问题或数据访问、删除请求，请通过 App Store 中的支持渠道或项目 Issue 页面联系 Nogic。', more:'服务提供商隐私信息'
      },
      es: {
        title:'Política de privacidad de Valcue', updated:'Última actualización: 20 de julio de 2026', intro:'Esta política explica cómo trata la información Valcue (la «Aplicación»), publicada por Nogic. Valcue no exige crear una cuenta nominativa ni iniciar sesión.',
        summaryH:'1. Resumen', summary:['El historial de entrenamiento, las rutinas, los registros de peso, los objetivos y los ajustes se guardan principalmente en el dispositivo.','Google Mobile Ads y Google Analytics for Firebase pueden tratar datos del dispositivo, de interacción, de diagnóstico y de ubicación aproximada.','Las funciones opcionales en la nube solo envían los datos necesarios para enlaces cortos de rutinas o actualizaciones remotas de Actividades en Directo.','Valcue no sube a sus funciones en la nube los registros de peso ni el historial de entrenamientos completados.'],
        localH:'2. Datos guardados en el dispositivo', local:'La Aplicación guarda localmente rutinas, historial de entrenamientos, peso y objetivos, preferencias, horarios de recordatorios y el estado de funciones Premium. Los datos permanecen hasta que elimines los registros, borres los datos de la Aplicación o la desinstales.',
        thirdH:'3. Servicios de Google', third:['Google Mobile Ads (AdMob) puede tratar la ubicación aproximada derivada de la IP, identificadores del dispositivo o publicitarios, interacciones y diagnósticos para mostrar anuncios, prevenir fraude, mantener la seguridad y cumplir obligaciones legales.','Google Analytics for Firebase registra eventos como la incorporación, la creación de rutinas, el inicio y fin de entrenamientos y las interacciones con pantallas Premium. Valcue no incluye nombres de rutinas, valores de peso ni registros del historial en esos eventos.','Al usar una función en la nube, Firebase Authentication y App Check pueden tratar un identificador anónimo, la dirección IP, el agente de usuario y datos de verificación del dispositivo o la aplicación.'],
        cloudH:'4. Funciones opcionales en la nube', cloud:['Al crear un enlace corto se suben el nombre de la rutina, el tipo de máquina y los intervalos con un ID aleatorio. Cualquiera que tenga el enlace puede recuperar la rutina. Si la nube no está disponible, la rutina se integra directamente en un enlace más largo.','Las actualizaciones remotas de Actividades en Directo de iOS pueden enviar un identificador anónimo, el token push de ActivityKit, la programación de la sesión y textos de rutina e intervalos listos para mostrar. Las programaciones activas caducan en un máximo de 12 horas y los registros de cancelación pueden conservarse hasta 24 horas.','Las rutinas de enlaces cortos pueden conservarse hasta su eliminación operativa o hasta recibir una solicitud válida. Para pedir que se borren, indica el ID del enlace.'],
        permissionsH:'5. Permisos y uso compartido', permissions:['Las notificaciones solo se usan si activas recordatorios o actualizaciones de intervalos en segundo plano.','La cámara solo se usa cuando escaneas el código QR de una rutina o haces una foto del entrenamiento. Las fotos permanecen en el dispositivo salvo que las compartas.','El portapapeles solo se consulta para reconocer enlaces de rutinas de Valcue que se puedan importar.','Lo que compartas será tratado por la aplicación o el servicio que elijas en el menú del sistema.'],
        retentionH:'6. Conservación, eliminación y opciones', retention:'Puedes borrar datos locales desde la Aplicación cuando se admita, eliminando sus datos o desinstalándola. Puedes desactivar las notificaciones, las actualizaciones en segundo plano y la cámara en los ajustes del sistema. Google conserva sus datos según sus propias políticas. Para eliminar una rutina compartida u otro registro de Valcue en la nube, usa el contacto inferior e incluye el enlace o los datos de sesión disponibles.',
        safetyH:'7. Menores y seguridad', safety:'Valcue está destinada a un público general de fitness, principalmente adulto, y no se dirige a menores. El tráfico externo usa cifrado. Ningún sistema garantiza una seguridad absoluta; evita incluir información personal sensible en nombres de rutinas o enlaces compartidos.',
        changesH:'8. Cambios', changes:'Podemos actualizar esta política cuando cambien la Aplicación o sus servicios. La versión vigente seguirá publicada en esta URL con una nueva fecha.',
        contactH:'9. Contacto', contact:'Para consultas de privacidad o solicitudes de acceso o eliminación, contacta con Nogic mediante el canal de soporte de la App Store o la página de incidencias del proyecto.', more:'Información de privacidad de los proveedores'
      },
      fr: {
        title:'Politique de confidentialité de Valcue', updated:'Dernière mise à jour : 20 juillet 2026', intro:'La présente politique explique comment Valcue (« l’Application »), publiée par Nogic, traite les informations. Valcue ne demande ni compte nominatif ni connexion.',
        summaryH:'1. Résumé', summary:['L’historique des entraînements, les séances, le poids, les objectifs et les réglages sont principalement stockés sur l’appareil.','Google Mobile Ads et Google Analytics for Firebase peuvent traiter des données relatives à l’appareil, aux interactions, aux diagnostics et à la localisation approximative.','Les fonctions cloud facultatives transmettent uniquement les données nécessaires aux liens courts de séances ou aux mises à jour à distance des Activités en direct.','Valcue ne téléverse ni les mesures de poids ni l’historique des entraînements terminés vers ses fonctions cloud.'],
        localH:'2. Données stockées sur l’appareil', local:'L’Application stocke localement les séances, l’historique des entraînements, le poids et les objectifs, les préférences, les rappels et l’état des fonctions Premium. Ces données restent sur l’appareil jusqu’à leur suppression dans l’Application, l’effacement des données de l’Application ou sa désinstallation.',
        thirdH:'3. Services Google', third:['Google Mobile Ads (AdMob) peut traiter la localisation approximative déduite de l’adresse IP, des identifiants d’appareil ou publicitaires, les interactions et les diagnostics afin de fournir des publicités, prévenir la fraude, assurer la sécurité et respecter la loi.','Google Analytics for Firebase enregistre des événements tels que l’intégration, la création de séances, le début et la fin d’un entraînement et les interactions avec les écrans Premium. Valcue n’y ajoute ni noms de séances, ni valeurs de poids, ni historique d’entraînement.','Lors de l’utilisation d’une fonction cloud, Firebase Authentication et App Check peuvent traiter un identifiant anonyme, l’adresse IP, l’agent utilisateur et des données d’attestation de l’appareil ou de l’application.'],
        cloudH:'4. Fonctions cloud facultatives', cloud:['La création d’un lien court téléverse le nom de la séance, le type d’appareil et les intervalles sous un identifiant aléatoire. Toute personne disposant du lien peut récupérer la séance. Si le cloud est indisponible, la séance est directement intégrée à un lien plus long.','Les mises à jour à distance des Activités en direct iOS peuvent transmettre un identifiant anonyme, le jeton push ActivityKit, le planning de la séance et des textes prêts à afficher. Les plannings actifs expirent sous 12 heures ; les traces d’annulation peuvent être conservées jusqu’à 24 heures.','Les séances partagées par lien court peuvent rester enregistrées jusqu’à une suppression opérationnelle ou une demande valable. Pour en demander la suppression, indiquez l’identifiant du lien.'],
        permissionsH:'5. Autorisations et partage', permissions:['Les notifications ne sont utilisées que si vous activez les rappels ou les mises à jour d’intervalles en arrière-plan.','La caméra n’est utilisée que pour scanner le code QR d’une séance ou prendre une photo d’entraînement. Les photos restent sur l’appareil sauf si vous les partagez.','Le presse-papiers est consulté uniquement pour reconnaître un lien de séance Valcue importable.','Tout partage est traité par l’application ou le service choisi dans la feuille de partage du système.'],
        retentionH:'6. Conservation, suppression et choix', retention:'Vous pouvez supprimer les données locales dans l’Application lorsque cette option existe, effacer ses données ou la désinstaller. Les notifications, les mises à jour en arrière-plan et la caméra peuvent être désactivées dans les réglages système. Google conserve les données tierces selon ses propres politiques. Pour supprimer une séance partagée ou une autre donnée cloud Valcue, utilisez le contact ci-dessous et joignez le lien ou les informations de session disponibles.',
        safetyH:'7. Enfants et sécurité', safety:'Valcue s’adresse à un public général de fitness, principalement adulte, et non aux enfants. Les échanges hors de l’appareil sont chiffrés. Aucun système n’étant absolument sûr, n’inscrivez aucune donnée personnelle sensible dans un nom de séance ou un lien partagé.',
        changesH:'8. Modifications', changes:'Nous pouvons mettre à jour cette politique lorsque l’Application ou ses services évoluent. La version en vigueur restera publiée à cette adresse avec une nouvelle date.',
        contactH:'9. Contact', contact:'Pour toute question ou demande d’accès ou de suppression, contactez Nogic via l’assistance indiquée sur l’App Store ou la page d’incidents du projet.', more:'Informations de confidentialité des fournisseurs'
      },
      de: {
        title:'Datenschutzerklärung von Valcue', updated:'Zuletzt aktualisiert: 20. Juli 2026', intro:'Diese Erklärung beschreibt, wie Valcue („App“), herausgegeben von Nogic, Informationen verarbeitet. Valcue verlangt weder ein persönliches Konto noch eine Anmeldung.',
        summaryH:'1. Überblick', summary:['Trainingsverlauf, Trainingspläne, Gewichtseinträge, Ziele und Einstellungen werden überwiegend auf dem Gerät gespeichert.','Google Mobile Ads und Google Analytics for Firebase können Geräte-, Nutzungs-, Diagnose- und ungefähre Standortdaten verarbeiten.','Optionale Cloud-Funktionen senden nur Daten, die für kurze Trainingslinks oder entfernte Live-Aktivitäts-Updates nötig sind.','Gewichtseinträge und der Verlauf abgeschlossener Trainings werden nicht in die Valcue-Cloud-Funktionen hochgeladen.'],
        localH:'2. Auf dem Gerät gespeicherte Daten', local:'Die App speichert Trainingspläne, Trainingsverlauf, Gewicht und Ziele, Einstellungen, Erinnerungszeiten und den Status von Premium-Funktionen lokal. Die Daten bleiben dort, bis du Einträge löschst, die App-Daten entfernst oder die App deinstallierst.',
        thirdH:'3. Google-Dienste', third:['Google Mobile Ads (AdMob) kann den aus der IP-Adresse abgeleiteten ungefähren Standort, Geräte- oder Werbe-IDs, App-Interaktionen und Diagnosedaten für Werbung, Betrugsprävention, Sicherheit und rechtliche Pflichten verarbeiten.','Google Analytics for Firebase erfasst Ereignisse wie Onboarding, Erstellung von Trainingsplänen, Beginn und Abschluss von Trainings sowie Interaktionen mit Premium-Seiten. Valcue fügt diesen Ereignissen keine Trainingsnamen, Gewichtswerte oder Verlaufsdaten hinzu.','Bei Nutzung einer Cloud-Funktion können Firebase Authentication und App Check eine anonyme Kennung, IP-Adresse, den User-Agent sowie Geräte- oder App-Bestätigungsdaten verarbeiten.'],
        cloudH:'4. Optionale Cloud-Funktionen', cloud:['Für einen kurzen Trainingslink werden Name, Gerätetyp und Intervalle unter einer zufälligen Link-ID hochgeladen. Jeder mit dem Link kann den Plan abrufen. Ist die Cloud nicht verfügbar, werden die Daten direkt in einen längeren Link eingebettet.','Entfernte iOS-Live-Aktivitäts-Updates können eine anonyme Kennung, den ActivityKit-Push-Token, den Zeitplan und anzeigefertige Trainings- und Intervalltexte senden. Aktive Zeitpläne laufen innerhalb von 12 Stunden ab; Stornodatensätze können bis zu 24 Stunden gespeichert bleiben.','Über Kurzlinks geteilte Trainingspläne können bis zur betrieblichen Löschung oder einer gültigen Löschanfrage gespeichert bleiben. Gib bei einer Anfrage die Link-ID an.'],
        permissionsH:'5. Berechtigungen und Teilen', permissions:['Benachrichtigungen werden nur bei aktivierten Trainingserinnerungen oder Hintergrund-Updates verwendet.','Die Kamera wird nur verwendet, wenn du den QR-Code eines Trainings scannst oder ein Trainingsfoto aufnimmst. Fotos bleiben auf dem Gerät, sofern du sie nicht teilst.','Die Zwischenablage wird ausschließlich auf importierbare Valcue-Trainingslinks geprüft.','Geteilte Inhalte werden von der im System-Teilen-Menü gewählten App oder dem Dienst verarbeitet.'],
        retentionH:'6. Speicherdauer, Löschung und Auswahl', retention:'Lokale Daten lassen sich in der App, durch Löschen der App-Daten oder durch Deinstallation entfernen. Benachrichtigungen, Hintergrund-Updates und Kamerazugriff können in den Systemeinstellungen deaktiviert werden. Google speichert Drittanbieterdaten nach eigenen Richtlinien. Für die Löschung eines geteilten Trainings oder anderer Valcue-Cloud-Daten nutze den Kontakt unten und gib verfügbare Link- oder Sitzungsdaten an.',
        safetyH:'7. Kinder und Sicherheit', safety:'Valcue richtet sich an ein allgemeines Fitnesspublikum, hauptsächlich Erwachsene, und nicht an Kinder. Datenübertragungen außerhalb des Geräts sind verschlüsselt. Absolute Sicherheit ist nicht möglich; trage keine sensiblen persönlichen Informationen in Trainingsnamen oder geteilte Links ein.',
        changesH:'8. Änderungen', changes:'Wir können diese Erklärung bei Änderungen an App oder Diensten aktualisieren. Die aktuelle Fassung bleibt mit neuem Datum unter dieser URL verfügbar.',
        contactH:'9. Kontakt', contact:'Wende dich bei Datenschutzfragen sowie Auskunfts- oder Löschanfragen über den im App Store genannten Support oder die Projekt-Issue-Seite an Nogic.', more:'Datenschutzinformationen der Anbieter'
      },
      it: {
        title:'Informativa sulla privacy di Valcue', updated:'Ultimo aggiornamento: 20 luglio 2026', intro:'Questa informativa spiega come Valcue (l’“App”), pubblicata da Nogic, tratta le informazioni. Valcue non richiede un account nominativo né l’accesso.',
        summaryH:'1. In breve', summary:['Cronologia degli allenamenti, routine, peso, obiettivi e impostazioni sono conservati principalmente sul dispositivo.','Google Mobile Ads e Google Analytics for Firebase possono trattare dati del dispositivo, interazioni, diagnostica e posizione approssimativa.','Le funzioni cloud facoltative inviano solo i dati necessari per link brevi delle routine o aggiornamenti remoti delle Attività in tempo reale.','Valcue non carica nelle proprie funzioni cloud i dati del peso né la cronologia degli allenamenti completati.'],
        localH:'2. Dati memorizzati sul dispositivo', local:'L’App salva localmente routine, cronologia, peso e obiettivi, preferenze, promemoria e stato delle funzioni Premium. I dati restano sul dispositivo finché non elimini i record, cancelli i dati dell’App o la disinstalli.',
        thirdH:'3. Servizi Google', third:['Google Mobile Ads (AdMob) può trattare posizione approssimativa ricavata dall’IP, identificatori del dispositivo o pubblicitari, interazioni e diagnostica per annunci, prevenzione delle frodi, sicurezza e obblighi di legge.','Google Analytics for Firebase registra eventi come onboarding, creazione di routine, avvio e completamento degli allenamenti e interazioni con schermate Premium. Valcue non include nomi delle routine, valori del peso o record della cronologia.','Quando usi una funzione cloud, Firebase Authentication e App Check possono trattare un identificatore anonimo, indirizzo IP, user agent e dati di attestazione del dispositivo o dell’App.'],
        cloudH:'4. Funzioni cloud facoltative', cloud:['Creando un link breve vengono caricati nome della routine, tipo di macchina e intervalli con un ID casuale. Chiunque abbia il link può recuperare la routine. Se il cloud non è disponibile, i dati vengono incorporati direttamente in un link più lungo.','Gli aggiornamenti remoti delle Attività in tempo reale di iOS possono inviare un identificatore anonimo, il token push ActivityKit, la pianificazione e testi pronti per la visualizzazione. Le pianificazioni attive scadono entro 12 ore; i record di annullamento possono restare fino a 24 ore.','Le routine condivise con link brevi possono restare archiviate fino alla rimozione operativa o a una richiesta valida. Per richiederne l’eliminazione, indica l’ID del link.'],
        permissionsH:'5. Autorizzazioni e condivisione', permissions:['Le notifiche sono usate solo se attivi promemoria o aggiornamenti degli intervalli in background.','La fotocamera è usata solo per scansionare il codice QR di una routine o scattare una foto dell’allenamento. Le foto restano sul dispositivo salvo condivisione.','Gli appunti vengono controllati solo per riconoscere un link Valcue importabile.','Ciò che condividi è trattato dall’app o dal servizio scelto nel menu di condivisione del sistema.'],
        retentionH:'6. Conservazione, eliminazione e scelte', retention:'Puoi eliminare i dati locali nell’App, cancellandone i dati o disinstallandola. Puoi disattivare notifiche, aggiornamenti in background e fotocamera nelle impostazioni di sistema. Google conserva i dati di terze parti secondo le proprie norme. Per eliminare una routine condivisa o un altro record cloud Valcue, usa il contatto seguente e allega il link o i dati di sessione disponibili.',
        safetyH:'7. Minori e sicurezza', safety:'Valcue è rivolta a un pubblico fitness generale, soprattutto adulto, e non ai minori. Il traffico esterno usa connessioni cifrate. Nessun sistema è del tutto sicuro: non inserire informazioni personali sensibili nei nomi delle routine o nei link condivisi.',
        changesH:'8. Modifiche', changes:'Potremmo aggiornare l’informativa quando cambiano l’App o i servizi. La versione corrente resterà a questo URL con una nuova data.',
        contactH:'9. Contatti', contact:'Per domande sulla privacy o richieste di accesso o eliminazione, contatta Nogic tramite l’assistenza indicata sull’App Store o la pagina delle segnalazioni del progetto.', more:'Informazioni sulla privacy dei fornitori'
      },
      pt: {
        title:'Política de Privacidade do Valcue', updated:'Última atualização: 20 de julho de 2026', intro:'Esta política explica como o Valcue (o “Aplicativo”), publicado pela Nogic, trata informações. O Valcue não exige conta nominal nem login.',
        summaryH:'1. Resumo', summary:['Histórico de treinos, rotinas, registros de peso, metas e ajustes ficam armazenados principalmente no dispositivo.','Google Mobile Ads e Google Analytics para Firebase podem tratar dados do dispositivo, interações, diagnósticos e localização aproximada.','Os recursos opcionais em nuvem enviam somente os dados necessários para links curtos de rotinas ou atualizações remotas de Atividades ao Vivo.','O Valcue não envia registros de peso nem o histórico de treinos concluídos para seus recursos em nuvem.'],
        localH:'2. Dados armazenados no dispositivo', local:'O Aplicativo salva localmente rotinas, histórico de treinos, peso e metas, preferências, horários de lembretes e estado dos recursos Premium. Esses dados permanecem no dispositivo até você excluir os registros, limpar os dados do Aplicativo ou desinstalá-lo.',
        thirdH:'3. Serviços do Google', third:['O Google Mobile Ads (AdMob) pode tratar localização aproximada derivada do IP, identificadores do dispositivo ou de publicidade, interações e diagnósticos para anúncios, prevenção de fraudes, segurança e obrigações legais.','O Google Analytics para Firebase registra eventos como integração inicial, criação de rotinas, início e conclusão de treinos e interações com telas Premium. O Valcue não inclui nomes de rotinas, valores de peso nem registros do histórico nesses eventos.','Ao usar um recurso em nuvem, Firebase Authentication e App Check podem tratar um identificador anônimo, endereço IP, agente do usuário e dados de atestado do dispositivo ou aplicativo.'],
        cloudH:'4. Recursos opcionais em nuvem', cloud:['Ao criar um link curto, o nome da rotina, o tipo de aparelho e os intervalos são enviados com um ID aleatório. Qualquer pessoa com o link pode obter a rotina. Se a nuvem estiver indisponível, os dados serão incorporados diretamente em um link mais longo.','Atualizações remotas das Atividades ao Vivo do iOS podem enviar identificador anônimo, token push do ActivityKit, programação da sessão e textos prontos para exibição. Programações ativas expiram em até 12 horas; registros de cancelamento podem permanecer por até 24 horas.','Rotinas compartilhadas por links curtos podem permanecer até a exclusão operacional ou uma solicitação válida. Para pedir a exclusão, informe o ID do link.'],
        permissionsH:'5. Permissões e compartilhamento', permissions:['As notificações só são usadas se você ativar lembretes ou atualizações de intervalos em segundo plano.','A câmera só é usada para escanear o código QR de uma rotina ou tirar uma foto do treino. As fotos ficam no dispositivo, a menos que você as compartilhe.','A área de transferência só é consultada para reconhecer links de rotina do Valcue que possam ser importados.','O que você compartilhar será tratado pelo aplicativo ou serviço escolhido no menu de compartilhamento do sistema.'],
        retentionH:'6. Retenção, exclusão e escolhas', retention:'Você pode excluir dados locais dentro do Aplicativo, limpar os dados ou desinstalá-lo. Notificações, atualizações em segundo plano e câmera podem ser desativadas nos ajustes do sistema. O Google retém dados de terceiros conforme suas próprias políticas. Para excluir uma rotina compartilhada ou outro registro do Valcue na nuvem, use o contato abaixo e inclua o link ou os dados de sessão disponíveis.',
        safetyH:'7. Crianças e segurança', safety:'O Valcue é destinado ao público geral de atividades físicas, principalmente adultos, e não é direcionado a crianças. O tráfego externo usa criptografia. Nenhum sistema é totalmente seguro; não inclua informações pessoais sensíveis em nomes de rotinas ou links compartilhados.',
        changesH:'8. Alterações', changes:'Podemos atualizar esta política quando o Aplicativo ou os serviços mudarem. A versão atual continuará neste endereço com uma nova data.',
        contactH:'9. Contato', contact:'Para dúvidas de privacidade ou pedidos de acesso ou exclusão, fale com a Nogic pelo suporte indicado na App Store ou pela página de issues do projeto.', more:'Informações de privacidade dos provedores'
      },
      ru: {
        title:'Политика конфиденциальности Valcue', updated:'Последнее обновление: 20 июля 2026 г.', intro:'В этой политике описано, как приложение Valcue, выпускаемое Nogic, обрабатывает информацию. Для Valcue не требуется именная учётная запись или вход.',
        summaryH:'1. Кратко', summary:['История тренировок, программы, вес, цели и настройки в основном хранятся на устройстве.','Google Mobile Ads и Google Analytics for Firebase могут обрабатывать данные об устройстве, действиях, диагностике и примерном местоположении.','Дополнительные облачные функции передают только данные для коротких ссылок на программы или удалённых обновлений Live Activity.','Valcue не загружает записи веса и историю завершённых тренировок в свои облачные функции.'],
        localH:'2. Данные на устройстве', local:'Приложение локально хранит программы, историю тренировок, вес и цели, настройки, расписание напоминаний и состояние функций Premium. Данные остаются на устройстве до удаления записей, очистки данных приложения или его удаления.',
        thirdH:'3. Сервисы Google', third:['Google Mobile Ads (AdMob) может обрабатывать примерное местоположение по IP-адресу, идентификаторы устройства или рекламы, действия и диагностику для показа рекламы, предотвращения мошенничества, безопасности и соблюдения закона.','Google Analytics for Firebase регистрирует события: прохождение знакомства, создание программы, начало и завершение тренировки, действия на экранах Premium. Valcue не добавляет туда названия программ, значения веса и записи истории.','При использовании облачной функции Firebase Authentication и App Check могут обрабатывать анонимный идентификатор, IP-адрес, user agent и данные аттестации устройства или приложения.'],
        cloudH:'4. Дополнительные облачные функции', cloud:['При создании короткой ссылки название программы, тип тренажёра и интервалы загружаются под случайным ID. Любой владелец ссылки может получить программу. Если облако недоступно, данные встраиваются в саму длинную ссылку.','Удалённые обновления iOS Live Activity могут передавать анонимный идентификатор, push-токен ActivityKit, расписание и готовые тексты программы и интервалов. Активные расписания истекают не позднее чем через 12 часов; записи отмены могут храниться до 24 часов.','Программы из коротких ссылок могут храниться до служебного удаления или обоснованного запроса. Для удаления укажите ID ссылки.'],
        permissionsH:'5. Разрешения и обмен', permissions:['Уведомления используются только при включённых напоминаниях или фоновых обновлениях интервалов.','Камера используется только для сканирования QR-кода программы или съёмки фото тренировки. Фото остаются на устройстве, если их не отправить.','Буфер обмена проверяется только для распознавания импортируемой ссылки Valcue.','Отправленные данные обрабатывает выбранное в системном меню приложение или сервис.'],
        retentionH:'6. Хранение, удаление и выбор', retention:'Локальные данные можно удалить в приложении, очисткой данных или удалением приложения. Уведомления, фоновые обновления и камеру можно отключить в настройках системы. Google хранит сторонние данные по собственным правилам. Для удаления общей программы или другой облачной записи Valcue воспользуйтесь контактом ниже и приложите доступную ссылку или данные сеанса.',
        safetyH:'7. Дети и безопасность', safety:'Valcue предназначено для широкой фитнес-аудитории, прежде всего взрослых, и не ориентировано на детей. Внешний трафик шифруется. Абсолютная безопасность невозможна: не указывайте чувствительные персональные данные в названиях программ и общих ссылках.',
        changesH:'8. Изменения', changes:'Политика может обновляться вместе с приложением или сервисами. Актуальная версия и новая дата будут опубликованы по этому адресу.',
        contactH:'9. Контакты', contact:'По вопросам конфиденциальности, доступа или удаления обратитесь в Nogic через поддержку в App Store или страницу задач проекта.', more:'Информация о конфиденциальности поставщиков'
      },
      ar: {
        title:'سياسة خصوصية Valcue', updated:'آخر تحديث: 20 يوليو 2026', intro:'توضح هذه السياسة كيفية تعامل تطبيق Valcue، الذي تنشره Nogic، مع المعلومات. لا يتطلب Valcue إنشاء حساب باسمك أو تسجيل الدخول.',
        summaryH:'1. الملخص', summary:['يُخزَّن سجل التمارين والبرامج وقياسات الوزن والأهداف والإعدادات بصورة أساسية على جهازك.','قد تعالج Google Mobile Ads وGoogle Analytics for Firebase بيانات الجهاز والتفاعل والتشخيص والموقع التقريبي.','لا ترسل الميزات السحابية الاختيارية إلا البيانات اللازمة لروابط البرامج القصيرة أو تحديثات الأنشطة المباشرة عن بُعد.','لا يرفع Valcue قياسات الوزن أو سجل التمارين المكتملة إلى ميزاته السحابية.'],
        localH:'2. البيانات المخزنة على الجهاز', local:'يخزن التطبيق محليًا البرامج وسجل التمارين والوزن والأهداف والتفضيلات ومواعيد التذكير وحالة ميزات Premium. تبقى هذه البيانات حتى تحذف السجلات أو تمسح بيانات التطبيق أو تزيله.',
        thirdH:'3. خدمات Google', third:['قد تعالج Google Mobile Ads ‏(AdMob) الموقع التقريبي المستنتج من عنوان IP ومعرّفات الجهاز أو الإعلانات وتفاعلات التطبيق وبيانات التشخيص لعرض الإعلانات ومنع الاحتيال والحفاظ على الأمان والامتثال للقانون.','يسجل Google Analytics for Firebase أحداثًا مثل الإعداد الأولي وإنشاء البرامج وبدء التمرين وإكماله والتفاعل مع شاشات Premium. لا يضع Valcue أسماء البرامج أو قيم الوزن أو سجلات التمرين ضمن هذه الأحداث.','عند استخدام ميزة سحابية، قد تعالج Firebase Authentication وApp Check معرّفًا مجهولًا وعنوان IP ووكيل المستخدم وبيانات التحقق من الجهاز أو التطبيق.'],
        cloudH:'4. الميزات السحابية الاختيارية', cloud:['عند إنشاء رابط قصير، يُرفع اسم البرنامج ونوع الجهاز وتفاصيل الفترات تحت معرّف رابط عشوائي. يستطيع أي شخص يملك الرابط استرداد البرنامج. وإذا لم تتوفر الخدمة السحابية، تُضمَّن البيانات داخل رابط أطول.','قد ترسل تحديثات الأنشطة المباشرة في iOS معرّفًا مجهولًا ورمز دفع ActivityKit وجدول جلسة التمرين ونصوص البرنامج والفترات الجاهزة للعرض. تنتهي الجداول النشطة خلال 12 ساعة، وقد تُحفظ سجلات الإلغاء حتى 24 ساعة.','قد تبقى البرامج المشتركة بروابط قصيرة حتى حذفها تشغيليًا أو ورود طلب حذف صالح. يرجى إرفاق معرّف الرابط بطلب الحذف.'],
        permissionsH:'5. أذونات الجهاز والمشاركة', permissions:['لا تُستخدم الإشعارات إلا عند تفعيل تذكيرات التمرين أو تحديثات الفترات في الخلفية.','لا تُستخدم الكاميرا إلا لمسح رمز QR لبرنامج تمرين أو التقاط صورة للتمرين. تبقى الصور على جهازك ما لم تشاركها.','لا تُفحص الحافظة إلا للتعرّف على رابط برنامج Valcue قابل للاستيراد.','تعالج المعلومات التي تشاركها الجهة التي تختارها من قائمة المشاركة في النظام.'],
        retentionH:'6. الاحتفاظ والحذف والخيارات', retention:'يمكن حذف البيانات المحلية من داخل التطبيق حيثما يتوفر ذلك، أو بمسح بياناته أو إزالته. ويمكن تعطيل الإشعارات والتحديثات في الخلفية والكاميرا من إعدادات النظام. تحتفظ Google ببيانات الطرف الثالث وفق سياساتها. لحذف برنامج مشترك أو سجل سحابي آخر لدى Valcue، استخدم وسيلة الاتصال أدناه وأرفق الرابط أو معلومات الجلسة المتاحة.',
        safetyH:'7. الأطفال والأمان', safety:'Valcue موجه لجمهور اللياقة العام، ولا سيما البالغين، وليس موجهًا للأطفال. تستخدم الاتصالات خارج الجهاز نقلًا مشفرًا. لا يوجد نظام آمن بصورة مطلقة، لذلك لا تضع معلومات شخصية حساسة في أسماء البرامج أو الروابط المشتركة.',
        changesH:'8. التغييرات', changes:'قد نحدّث هذه السياسة عند تغير التطبيق أو خدماته. ستظل النسخة الحالية منشورة على هذا العنوان مع تاريخ تحديث جديد.',
        contactH:'9. التواصل', contact:'للأسئلة المتعلقة بالخصوصية أو طلبات الوصول أو الحذف، تواصل مع Nogic عبر قناة الدعم في App Store أو صفحة مشكلات المشروع.', more:'معلومات الخصوصية لدى مزودي الخدمات'
      },
      vi: {
        title:'Chính sách quyền riêng tư của Valcue', updated:'Cập nhật lần cuối: 20 tháng 7, 2026', intro:'Chính sách này giải thích cách Valcue (“Ứng dụng”), do Nogic phát hành, xử lý thông tin. Valcue không yêu cầu tài khoản có tên hoặc đăng nhập.',
        summaryH:'1. Tóm tắt', summary:['Lịch sử tập luyện, chương trình, cân nặng, mục tiêu và cài đặt chủ yếu được lưu trên thiết bị.','Google Mobile Ads và Google Analytics for Firebase có thể xử lý dữ liệu thiết bị, tương tác, chẩn đoán và vị trí gần đúng.','Các tính năng đám mây tùy chọn chỉ gửi dữ liệu cần thiết cho liên kết chương trình ngắn hoặc cập nhật Hoạt động trực tiếp từ xa.','Valcue không tải số đo cân nặng hoặc lịch sử buổi tập đã hoàn thành lên các tính năng đám mây.'],
        localH:'2. Dữ liệu lưu trên thiết bị', local:'Ứng dụng lưu cục bộ chương trình, lịch sử tập luyện, cân nặng và mục tiêu, tùy chọn, lịch nhắc và trạng thái tính năng Premium. Dữ liệu ở lại thiết bị cho đến khi bạn xóa bản ghi, xóa dữ liệu Ứng dụng hoặc gỡ cài đặt.',
        thirdH:'3. Dịch vụ Google', third:['Google Mobile Ads (AdMob) có thể xử lý vị trí gần đúng suy ra từ IP, mã nhận dạng thiết bị hoặc quảng cáo, tương tác và chẩn đoán để cung cấp quảng cáo, ngăn gian lận, bảo mật và tuân thủ pháp luật.','Google Analytics for Firebase ghi nhận các sự kiện như hoàn tất hướng dẫn, tạo chương trình, bắt đầu và hoàn thành buổi tập, tương tác với màn hình Premium. Valcue không đưa tên chương trình, số đo cân nặng hoặc lịch sử tập vào các sự kiện này.','Khi dùng tính năng đám mây, Firebase Authentication và App Check có thể xử lý mã nhận dạng ẩn danh, địa chỉ IP, user agent và dữ liệu xác thực thiết bị hoặc ứng dụng.'],
        cloudH:'4. Tính năng đám mây tùy chọn', cloud:['Khi tạo liên kết ngắn, tên chương trình, loại máy và chi tiết quãng tập được tải lên dưới một ID ngẫu nhiên. Bất kỳ ai có liên kết đều có thể tải chương trình. Nếu đám mây không khả dụng, dữ liệu được nhúng trực tiếp vào một liên kết dài hơn.','Cập nhật Hoạt động trực tiếp iOS từ xa có thể gửi mã nhận dạng ẩn danh, token đẩy ActivityKit, lịch buổi tập và nội dung chương trình/quãng tập sẵn để hiển thị. Lịch đang hoạt động hết hạn trong 12 giờ; bản ghi hủy có thể được giữ tối đa 24 giờ.','Chương trình được chia sẻ bằng liên kết ngắn có thể được lưu cho đến khi xóa trong vận hành hoặc nhận yêu cầu hợp lệ. Hãy cung cấp ID liên kết khi yêu cầu xóa.'],
        permissionsH:'5. Quyền thiết bị và chia sẻ', permissions:['Thông báo chỉ được dùng khi bạn bật lời nhắc hoặc cập nhật quãng tập trong nền.','Camera chỉ được dùng để quét mã QR của chương trình hoặc chụp ảnh buổi tập. Ảnh ở lại thiết bị trừ khi bạn chia sẻ.','Bảng nhớ tạm chỉ được kiểm tra để nhận diện liên kết chương trình Valcue có thể nhập.','Nội dung bạn chia sẻ do ứng dụng hoặc dịch vụ được chọn trong bảng chia sẻ hệ thống xử lý.'],
        retentionH:'6. Lưu giữ, xóa và lựa chọn', retention:'Bạn có thể xóa dữ liệu cục bộ trong Ứng dụng, xóa dữ liệu ứng dụng hoặc gỡ cài đặt. Có thể tắt thông báo, cập nhật nền và camera trong cài đặt hệ thống. Google lưu dữ liệu bên thứ ba theo chính sách riêng. Để xóa chương trình đã chia sẻ hoặc bản ghi đám mây Valcue khác, hãy dùng liên hệ bên dưới và gửi kèm liên kết hoặc thông tin phiên nếu có.',
        safetyH:'7. Trẻ em và bảo mật', safety:'Valcue dành cho người tập thể dục nói chung, chủ yếu là người lớn, và không hướng đến trẻ em. Dữ liệu truyền ra ngoài thiết bị được mã hóa. Không hệ thống nào an toàn tuyệt đối; đừng ghi thông tin cá nhân nhạy cảm trong tên chương trình hoặc liên kết chia sẻ.',
        changesH:'8. Thay đổi', changes:'Chúng tôi có thể cập nhật chính sách khi Ứng dụng hoặc dịch vụ thay đổi. Bản hiện hành và ngày cập nhật mới sẽ tiếp tục được đăng tại URL này.',
        contactH:'9. Liên hệ', contact:'Nếu có câu hỏi về quyền riêng tư hoặc yêu cầu truy cập, xóa dữ liệu, hãy liên hệ Nogic qua kênh hỗ trợ trên App Store hoặc trang issue của dự án.', more:'Thông tin quyền riêng tư của nhà cung cấp'
      },
      th: {
        title:'นโยบายความเป็นส่วนตัวของ Valcue', updated:'อัปเดตล่าสุด: 20 กรกฎาคม 2026', intro:'นโยบายนี้อธิบายวิธีที่ Valcue (“แอป”) ซึ่งเผยแพร่โดย Nogic จัดการข้อมูล โดย Valcue ไม่กำหนดให้สร้างบัญชีที่ระบุชื่อหรือเข้าสู่ระบบ',
        summaryH:'1. สรุป', summary:['ประวัติการออกกำลังกาย โปรแกรม น้ำหนัก เป้าหมาย และการตั้งค่าส่วนใหญ่จัดเก็บไว้ในอุปกรณ์','Google Mobile Ads และ Google Analytics for Firebase อาจประมวลผลข้อมูลอุปกรณ์ การใช้งาน การวินิจฉัย และตำแหน่งโดยประมาณ','ฟีเจอร์คลาวด์ที่เลือกใช้จะส่งเฉพาะข้อมูลที่จำเป็นสำหรับลิงก์โปรแกรมแบบสั้นหรือการอัปเดตกิจกรรมสดจากระยะไกล','Valcue ไม่อัปโหลดข้อมูลน้ำหนักหรือประวัติการออกกำลังกายที่เสร็จแล้วไปยังฟีเจอร์คลาวด์'],
        localH:'2. ข้อมูลที่เก็บในอุปกรณ์', local:'แอปจัดเก็บโปรแกรม ประวัติการออกกำลังกาย น้ำหนักและเป้าหมาย การตั้งค่า ตารางเตือน และสถานะฟีเจอร์ Premium ไว้ในอุปกรณ์ ข้อมูลจะอยู่จนกว่าคุณจะลบรายการ ล้างข้อมูลแอป หรือถอนการติดตั้ง',
        thirdH:'3. บริการของ Google', third:['Google Mobile Ads (AdMob) อาจประมวลผลตำแหน่งโดยประมาณจาก IP ตัวระบุอุปกรณ์หรือโฆษณา การใช้งาน และข้อมูลวินิจฉัย เพื่อแสดงโฆษณา ป้องกันการทุจริต รักษาความปลอดภัย และปฏิบัติตามกฎหมาย','Google Analytics for Firebase บันทึกเหตุการณ์ เช่น การเริ่มต้นใช้งาน การสร้างโปรแกรม การเริ่มและจบการออกกำลังกาย และการใช้หน้าจอ Premium โดย Valcue ไม่ใส่ชื่อโปรแกรม ค่าน้ำหนัก หรือประวัติการออกกำลังกายในเหตุการณ์เหล่านี้','เมื่อใช้ฟีเจอร์คลาวด์ Firebase Authentication และ App Check อาจประมวลผลตัวระบุแบบไม่เปิดเผยชื่อ ที่อยู่ IP user agent และข้อมูลยืนยันอุปกรณ์หรือแอป'],
        cloudH:'4. ฟีเจอร์คลาวด์ที่เลือกใช้', cloud:['เมื่อสร้างลิงก์สั้น ชื่อโปรแกรม ประเภทเครื่อง และรายละเอียดช่วงจะถูกอัปโหลดภายใต้ ID แบบสุ่ม ทุกคนที่มีลิงก์สามารถเรียกดูโปรแกรมได้ หากคลาวด์ใช้ไม่ได้ ข้อมูลจะฝังอยู่ในลิงก์ที่ยาวกว่าแทน','การอัปเดตกิจกรรมสดของ iOS จากระยะไกลอาจส่งตัวระบุแบบไม่เปิดเผยชื่อ โทเค็นพุช ActivityKit ตารางเซสชัน และข้อความโปรแกรม/ช่วงที่พร้อมแสดง ตารางที่ใช้งานจะหมดอายุภายใน 12 ชั่วโมง และอาจเก็บบันทึกการยกเลิกได้สูงสุด 24 ชั่วโมง','โปรแกรมจากลิงก์สั้นอาจถูกเก็บจนกว่าจะมีการลบในการดำเนินงานหรือได้รับคำขอที่ถูกต้อง โปรดระบุ ID ลิงก์เมื่อขอลบ'],

    copy.nl = {
      title:'Privacybeleid van Valcue', updated:'Laatst bijgewerkt: 20 juli 2026', intro:'Dit beleid legt uit hoe Valcue (de “App”), uitgegeven door Nogic, met informatie omgaat. Valcue vereist geen account op naam en geen aanmelding.',
      summaryH:'1. Samenvatting', summary:['Trainingsgeschiedenis, routines, gewicht, doelen en instellingen worden hoofdzakelijk op je apparaat bewaard.','Google Mobile Ads en Google Analytics for Firebase kunnen apparaat-, gebruiks-, diagnose- en globale locatiegegevens verwerken.','Optionele cloudfuncties versturen alleen gegevens voor korte routinelinks of externe Live Activity-updates.','Gewichtsgegevens en voltooide trainingsgeschiedenis worden niet naar de cloudfuncties van Valcue geüpload.'],
      localH:'2. Gegevens op het apparaat', local:'De App bewaart routines, trainingsgeschiedenis, gewicht en doelen, voorkeuren, herinneringen en de status van Premium-functies lokaal. Deze gegevens blijven staan totdat je records verwijdert, de appgegevens wist of de App verwijdert.',
      thirdH:'3. Google-diensten', third:['Google Mobile Ads (AdMob) kan globale locatie op basis van IP, apparaat- of advertentie-ID’s, appgebruik en diagnostiek verwerken voor advertenties, fraudepreventie, beveiliging en wettelijke verplichtingen.','Google Analytics for Firebase registreert gebeurtenissen zoals onboarding, het maken van routines, het starten en voltooien van trainingen en gebruik van Premium-schermen. Valcue voegt daar geen routinenamen, gewichtswaarden of trainingsrecords aan toe.','Bij gebruik van een cloudfunctie kunnen Firebase Authentication en App Check een anonieme ID, IP-adres, user-agent en apparaat- of appattestgegevens verwerken.'],
      cloudH:'4. Optionele cloudfuncties', cloud:['Een korte deellink uploadt de routinenaam, het apparaattype en de intervallen onder een willekeurige link-ID. Iedereen met de link kan de routine ophalen. Zonder cloud worden de gegevens rechtstreeks in een langere link opgenomen.','Externe iOS Live Activity-updates kunnen een anonieme ID, ActivityKit-pushtoken, trainingsschema en kant-en-klare schermtekst verzenden. Actieve schema’s verlopen binnen 12 uur; annuleringsrecords kunnen tot 24 uur worden bewaard.','Routines met een korte link kunnen worden bewaard tot operationele verwijdering of een geldig verwijderingsverzoek. Vermeld de link-ID in je verzoek.'],
      permissionsH:'5. Toestemmingen en delen', permissions:['Meldingen worden alleen gebruikt als je herinneringen of achtergrondupdates inschakelt.','De camera wordt alleen gebruikt om de QR-code van een routine te scannen of een trainingsfoto te maken. Foto’s blijven op je apparaat tenzij je ze deelt.','Het klembord wordt alleen gecontroleerd op een importeerbare Valcue-routinelink.','Gedeelde informatie wordt verwerkt door de app of dienst die je in het systeemdeelmenu kiest.'],
      retentionH:'6. Bewaren, verwijderen en keuzes', retention:'Verwijder lokale gegevens in de App, door appgegevens te wissen of de App te verwijderen. Meldingen, achtergrondupdates en camera kunnen in de systeeminstellingen worden uitgeschakeld. Google hanteert zijn eigen bewaarbeleid. Neem voor verwijdering van gedeelde routines of andere Valcue-cloudgegevens contact op met de beschikbare link- of sessiegegevens.',
      safetyH:'7. Kinderen en beveiliging', safety:'Valcue is vooral bedoeld voor volwassen sporters en niet voor kinderen. Extern verkeer is versleuteld, maar geen enkel systeem is volledig veilig. Zet geen gevoelige persoonsgegevens in routinenamen of gedeelde links.',
      changesH:'8. Wijzigingen', changes:'We kunnen dit beleid aanpassen wanneer de App of diensten veranderen. De actuele versie en datum blijven op deze URL staan.',
      contactH:'9. Contact', contact:'Neem voor privacyvragen of inzage- en verwijderingsverzoeken contact op met Nogic via de App Store-ondersteuning of de issuepagina van het project.', more:'Privacyinformatie van dienstverleners'
    };
    copy.da = {
      title:'Valcues privatlivspolitik', updated:'Senest opdateret: 20. juli 2026', intro:'Denne politik forklarer, hvordan Valcue (“appen”), udgivet af Nogic, behandler oplysninger. Valcue kræver hverken en navngiven konto eller login.',
      summaryH:'1. Overblik', summary:['Træningshistorik, rutiner, vægt, mål og indstillinger gemmes hovedsageligt på din enhed.','Google Mobile Ads og Google Analytics for Firebase kan behandle enheds-, brugs-, diagnose- og omtrentlige placeringsdata.','Valgfrie cloudfunktioner sender kun data til korte rutinelinks eller eksterne Live Activity-opdateringer.','Vægtdata og historik over afsluttede træninger uploades ikke til Valcues cloudfunktioner.'],
      localH:'2. Data på enheden', local:'Appen gemmer rutiner, træningshistorik, vægt og mål, præferencer, påmindelser og Premium-status lokalt. Dataene bliver liggende, indtil du sletter poster, rydder appdata eller afinstallerer appen.',
      thirdH:'3. Google-tjenester', third:['Google Mobile Ads (AdMob) kan behandle omtrentligt sted udledt af IP, enheds- eller annonce-id’er, appbrug og diagnosticering til annoncer, forebyggelse af svindel, sikkerhed og lovkrav.','Google Analytics for Firebase registrerer hændelser som onboarding, oprettelse af rutiner, start og afslutning af træning samt brug af Premium-skærme. Valcue tilføjer ikke rutinenavne, vægtværdier eller træningshistorik til disse hændelser.','Ved brug af en cloudfunktion kan Firebase Authentication og App Check behandle et anonymt id, IP-adresse, user agent og attestationsdata for enheden eller appen.'],
      cloudH:'4. Valgfrie cloudfunktioner', cloud:['Et kort delingslink uploader rutinenavn, maskintype og intervaller under et tilfældigt link-id. Alle med linket kan hente rutinen. Uden cloud indlejres oplysningerne direkte i et længere link.','Eksterne iOS Live Activity-opdateringer kan sende anonymt id, ActivityKit-pushtoken, træningsplan og visningsklar tekst. Aktive planer udløber inden for 12 timer; annulleringsposter kan gemmes i op til 24 timer.','Rutiner med korte links kan gemmes indtil driftsmæssig sletning eller en gyldig sletteanmodning. Oplys link-id’et i anmodningen.'],
      permissionsH:'5. Tilladelser og deling', permissions:['Notifikationer bruges kun, når du aktiverer påmindelser eller baggrundsopdateringer.','Kameraet bruges kun til at scanne en routines QR-kode eller tage et træningsbillede. Billeder bliver på enheden, medmindre du deler dem.','Udklipsholderen kontrolleres kun for et Valcue-rutinelink, der kan importeres.','Delte oplysninger behandles af den app eller tjeneste, du vælger i systemets delingsmenu.'],
      retentionH:'6. Opbevaring, sletning og valg', retention:'Slet lokale data i appen, ved at rydde appdata eller afinstallere. Notifikationer, baggrundsopdateringer og kamera kan slås fra i systemindstillingerne. Google følger sine egne opbevaringsregler. Kontakt os med tilgængelige link- eller sessionsoplysninger for at slette delte rutiner eller andre Valcue-clouddata.',
      safetyH:'7. Børn og sikkerhed', safety:'Valcue er primært beregnet til voksne og er ikke rettet mod børn. Ekstern trafik er krypteret, men intet system er helt sikkert. Skriv ikke følsomme personoplysninger i rutinenavne eller delte links.',
      changesH:'8. Ændringer', changes:'Vi kan opdatere politikken, når appen eller tjenesterne ændres. Den aktuelle version og dato forbliver på denne URL.',
      contactH:'9. Kontakt', contact:'Kontakt Nogic via App Store-supporten eller projektets issue-side ved privatlivsspørgsmål og anmodninger om indsigt eller sletning.', more:'Privatlivsoplysninger fra tjenesteudbydere'
    };
    copy.nb = {
      title:'Valcues personvernerklæring', updated:'Sist oppdatert: 20. juli 2026', intro:'Denne erklæringen forklarer hvordan Valcue («appen»), utgitt av Nogic, behandler opplysninger. Valcue krever verken en navngitt konto eller innlogging.',
      summaryH:'1. Sammendrag', summary:['Treningshistorikk, rutiner, vekt, mål og innstillinger lagres hovedsakelig på enheten.','Google Mobile Ads og Google Analytics for Firebase kan behandle enhets-, bruks-, diagnose- og omtrentlige posisjonsdata.','Valgfrie skyfunksjoner sender bare data for korte rutinelenker eller eksterne Live Activity-oppdateringer.','Vektdata og historikk over fullførte treningsøkter lastes ikke opp til Valcues skyfunksjoner.'],
      localH:'2. Data på enheten', local:'Appen lagrer rutiner, treningshistorikk, vekt og mål, innstillinger, påminnelser og Premium-status lokalt. Dataene blir liggende til du sletter oppføringer, tømmer appdata eller avinstallerer appen.',
      thirdH:'3. Google-tjenester', third:['Google Mobile Ads (AdMob) kan behandle omtrentlig posisjon fra IP, enhets- eller annonse-ID-er, appbruk og diagnostikk for annonser, svindelforebygging, sikkerhet og lovkrav.','Google Analytics for Firebase registrerer hendelser som onboarding, oppretting av rutiner, start og fullføring av trening og bruk av Premium-skjermer. Valcue legger ikke inn rutinenavn, vektverdier eller treningshistorikk i disse hendelsene.','Ved bruk av en skyfunksjon kan Firebase Authentication og App Check behandle anonym ID, IP-adresse, user agent og attestasjonsdata for enheten eller appen.'],
      cloudH:'4. Valgfrie skyfunksjoner', cloud:['En kort delingslenke laster opp rutinenavn, apparattype og intervaller under en tilfeldig lenke-ID. Alle med lenken kan hente rutinen. Uten skyen bygges dataene direkte inn i en lengre lenke.','Eksterne iOS Live Activity-oppdateringer kan sende anonym ID, ActivityKit-pushtoken, treningsplan og visningsklar tekst. Aktive planer utløper innen 12 timer; kanselleringsposter kan lagres i opptil 24 timer.','Rutiner med korte lenker kan lagres til driftsmessig sletting eller en gyldig sletteforespørsel. Oppgi lenke-ID-en i forespørselen.'],
      permissionsH:'5. Tillatelser og deling', permissions:['Varsler brukes bare når du aktiverer påminnelser eller bakgrunnsoppdateringer.','Kameraet brukes bare til å skanne QR-koden til en rutine eller ta et treningsbilde. Bilder blir på enheten med mindre du deler dem.','Utklippstavlen sjekkes bare for en importerbar Valcue-rutinelenke.','Delte opplysninger behandles av appen eller tjenesten du velger i systemets delingsmeny.'],
      retentionH:'6. Lagring, sletting og valg', retention:'Slett lokale data i appen, ved å tømme appdata eller avinstallere. Varsler, bakgrunnsoppdateringer og kamera kan slås av i systeminnstillingene. Google følger egne lagringsregler. Kontakt oss med tilgjengelige lenke- eller øktopplysninger for å slette delte rutiner eller andre Valcue-skydata.',
      safetyH:'7. Barn og sikkerhet', safety:'Valcue er primært beregnet på voksne og er ikke rettet mot barn. Ekstern trafikk er kryptert, men ingen løsning er helt sikker. Ikke legg følsomme personopplysninger i rutinenavn eller delte lenker.',
      changesH:'8. Endringer', changes:'Vi kan oppdatere erklæringen når appen eller tjenestene endres. Gjeldende versjon og dato forblir på denne nettadressen.',
      contactH:'9. Kontakt', contact:'Kontakt Nogic via App Store-støtten eller prosjektets issue-side ved personvernspørsmål og forespørsler om innsyn eller sletting.', more:'Personverninformasjon fra tjenesteleverandører'
    };

    const languageSelect = document.getElementById('language');
    for (const [code, name] of Object.entries(names)) {
      const option = document.createElement('option'); option.value = code; option.textContent = name; languageSelect.append(option);
    }
    const requested = new URLSearchParams(location.search).get('lang');
    const browser = (navigator.language || 'en').toLowerCase().split('-')[0];
    let active = copy[requested] ? requested : (copy[browser] ? browser : 'en');

    function add(tag, text, parent) { const node = document.createElement(tag); node.textContent = text; parent.append(node); return node; }
    function section(root, heading, content) {
      add('h2', heading, root);
      if (Array.isArray(content)) { const list = document.createElement('ul'); content.forEach(item => add('li', item, list)); root.append(list); }
      else add('p', content, root);
    }
    function render(code) {
      const c = copy[code] || copy.en; active = code;
      document.documentElement.lang = code; document.documentElement.dir = code === 'ar' ? 'rtl' : 'ltr';
      document.title = c.title; languageSelect.value = code;
      document.getElementById('language-label').textContent = languageLabels[code];
      languageSelect.setAttribute('aria-label', languageLabels[code]);
      const root = document.getElementById('policy'); root.replaceChildren();
      add('h1', c.title, root); add('p', c.updated, root).className = 'meta'; add('p', c.intro, root);
      section(root,c.summaryH,c.summary); section(root,c.localH,c.local); section(root,c.thirdH,c.third); section(root,c.cloudH,c.cloud); section(root,c.permissionsH,c.permissions); section(root,c.retentionH,c.retention); section(root,c.safetyH,c.safety); section(root,c.changesH,c.changes); section(root,c.contactH,c.contact);
      const contact = document.createElement('p'); const issue = document.createElement('a'); issue.href='https://github.com/wsng2222/Valcue/issues'; issue.textContent='github.com/wsng2222/Valcue/issues'; contact.append(issue); root.append(contact);
      add('h2', c.more, root); const links = document.createElement('ul');
      [['Google Mobile Ads','https://developers.google.com/admob/android/privacy/play-data-disclosure'],['Firebase','https://firebase.google.com/support/privacy'],['Google','https://policies.google.com/privacy']].forEach(([label,url]) => { const li=document.createElement('li'); const a=document.createElement('a'); a.href=url; a.textContent=label; li.append(a); links.append(li); }); root.append(links);
      const url = new URL(location.href); url.searchParams.set('lang', code); history.replaceState(null,'',url);
    }
    languageSelect.addEventListener('change', () => render(languageSelect.value));
    render(active);
