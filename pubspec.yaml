name: valcue
description: Valcue voice-guided interval cardio app.
publish_to: 'none'

version: 1.0.1+3

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  adaptive_platform_ui: ^0.1.101
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2
  flutter_tts: ^4.0.2
  provider: ^6.1.1
  wakelock_plus: ^1.1.6
  audioplayers: ^0.18.3
  audio_session: ^0.1.21
  google_mobile_ads: ^9.0.0
  purchases_flutter: ^9.10.5
  purchases_ui_flutter: ^9.10.5
  google_fonts: ^6.1.0
  liquid_glass_renderer: ^0.2.0-dev.4
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^4.1.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.1
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  firebase_app_check: ^0.4.5+2
  cloud_functions: ^6.3.5
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  fake_async: ^1.3.1

dependency_overrides:
  win32: ^5.15.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/sfx/beep.mp3
    - assets/sfx/finished.mp3
